<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>ETF 监控台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='s' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='%23ffffff'/><stop offset='.45' stop-color='%23e8e9ee'/><stop offset='.55' stop-color='%23a8aab2'/><stop offset='1' stop-color='%23f7f8fa'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='%23000'/><text x='49' y='48' font-family='Georgia,Times New Roman,serif' font-size='42' font-style='italic' font-weight='700' letter-spacing='1' fill='url(%23s)' text-anchor='middle'>AY</text><rect x='28' y='55' width='44' height='1.6' fill='%23d4d5db'/><text x='52' y='81' font-family='Helvetica,Arial,sans-serif' font-size='20' font-weight='700' letter-spacing='5' fill='url(%23s)' text-anchor='middle'>ETF</text></svg>">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<style>
:root { --plane:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --muted:#898781; --ring:rgba(11,11,11,.12); --accent:#2a78d6; --bad:#d03b3b; }
@media (prefers-color-scheme: dark) {
  :root { --plane:#0d0d0d; --surface:#1a1a19; --ink:#fff; --muted:#898781; --ring:rgba(255,255,255,.12); --accent:#3987e5; --bad:#e66767; }
}
* { box-sizing:border-box; margin:0; }
html, body { height:100%; }
body { background:var(--plane); font:15px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--ink); }
#gate { min-height:100%; display:flex; align-items:center; justify-content:center; padding:20px; }
.card { background:var(--surface); border:1px solid var(--ring); border-radius:14px; padding:30px 26px; width:100%; max-width:340px; text-align:center; }
h1 { font-size:19px; margin-bottom:4px; }
.sub { color:var(--muted); font-size:12.5px; margin-bottom:18px; }
input { width:100%; font:16px system-ui; padding:10px 12px; border-radius:9px; border:1px solid var(--ring); background:var(--plane); color:var(--ink); margin-bottom:10px; }
button { width:100%; font:600 15px system-ui; padding:10px; border-radius:9px; border:none; background:var(--accent); color:#fff; cursor:pointer; }
#msg { font-size:12.5px; color:var(--bad); margin-top:10px; min-height:1.2em; }
#frame { display:none; border:0; width:100%; height:100%; }
#lock { position:fixed; right:10px; bottom:10px; z-index:9; display:none; font-size:11px; color:var(--muted); background:var(--surface); border:1px solid var(--ring); border-radius:99px; padding:4px 10px; cursor:pointer; }
#reportbtn { position:fixed; left:10px; bottom:10px; z-index:9; display:none; font:600 12px system-ui; color:#fff; background:var(--accent); border:none; border-radius:99px; padding:7px 14px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.25); }
#panel { position:fixed; inset:0; z-index:10; display:none; align-items:flex-end; justify-content:center; background:rgba(0,0,0,.45); }
#panel .sheet { background:var(--surface); border:1px solid var(--ring); border-radius:16px 16px 0 0; padding:20px 18px 26px; width:100%; max-width:520px; }
#panel h2 { font-size:15px; margin-bottom:4px; }
#panel .hint { font-size:12px; color:var(--muted); margin-bottom:10px; line-height:1.5; }
#panel textarea { width:100%; min-height:110px; font:15px system-ui; padding:10px 12px; border-radius:9px; border:1px solid var(--ring); background:var(--plane); color:var(--ink); resize:vertical; margin-bottom:8px; }
#panel .row { display:flex; gap:8px; }
#panel .row button { flex:1; }
#panel .ghost { background:var(--plane); color:var(--ink); border:1px solid var(--ring); }
#tokwrap { display:none; margin-bottom:8px; }
#pmsg { font-size:12.5px; margin-top:8px; min-height:1.2em; }
#pmsg.ok { color:#0ca30c; } #pmsg.err { color:var(--bad); }
</style>
</head>
<body>
<div id="gate"><div class="card">
  <h1>📊 ETF 监控台</h1>
  <div class="sub">数据经端到端加密托管，输入访问口令解锁<br>（本设备只需输入一次）</div>
  <input type="password" id="pw" placeholder="访问口令" autocomplete="current-password">
  <button id="go" type="button">解锁</button>
  <div id="msg"></div>
</div></div>
<iframe id="frame" title="dashboard"></iframe>
<div id="lock">🔒 锁定</div>
<button id="reportbtn" type="button">✍️ 回报</button>
<div id="panel"><div class="sheet">
  <h2>✍️ 向监控系统回报</h2>
  <div class="hint">写下要回报的内容——成交回报、校准数据、或任何要交代的话。内容将用你的口令加密提交，最迟 1 小时内进入系统，由下一次例行运行处理并在仪表盘给出回执。<br>例：「VEA 实际 4.23556018 股；Revolut 显示总盈亏 +$12.3」</div>
  <div id="tokwrap">
    <div class="hint">首次提交需要「回报令牌」（仅限公共仓库的 fine-grained PAT，见 docs/DASH-PAGES-SETUP.md 第 5 步），本设备只输一次：</div>
    <input type="password" id="tok" placeholder="github_pat_...">
  </div>
  <textarea id="report" placeholder="要回报的内容...（可留空只发附件）"></textarea>
  <div class="row" style="margin-bottom:8px">
    <button class="ghost" id="pattach" type="button">📎 附件（截图/对账单）</button>
    <input type="file" id="pfile" accept="image/*,application/pdf" style="display:none">
  </div>
  <div id="pfinfo" class="hint" style="display:none"></div>
  <div class="row">
    <button class="ghost" id="pcancel" type="button">取消</button>
    <button id="psend" type="button">加密提交</button>
  </div>
  <div id="pmsg"></div>
</div></div>
<script>
const $ = (id) => document.getElementById(id);
const b64d = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));

async function deriveKey(pw, salt, iter) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: iter, hash: "SHA-256" }, km,
    { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
}

async function unlock(pw, silent) {
  $("msg").textContent = "";
  try {
    const r = await fetch("data.enc?t=" + Date.now(), { cache: "no-store" });
    if (!r.ok) throw new Error("fetch " + r.status);
    const j = await r.json();
    const key = await deriveKey(pw, b64d(j.salt), j.iter || 300000);
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64d(j.iv) }, key, b64d(j.ct));
    localStorage.setItem("dashpw", pw);
    $("gate").style.display = "none";
    $("frame").style.display = "block";
    $("lock").style.display = "block";
    $("reportbtn").style.display = "block";
    $("frame").srcdoc = new TextDecoder().decode(pt);
  } catch (e) {
    if (!silent) $("msg").textContent = /fetch/.test(String(e)) ? "数据加载失败，稍后重试" : "口令错误";
  }
}

$("go").addEventListener("click", () => unlock($("pw").value, false));
$("pw").addEventListener("keydown", (e) => { if (e.key === "Enter") unlock($("pw").value, false); });
$("lock").addEventListener("click", () => { localStorage.removeItem("dashpw"); localStorage.removeItem("dashtok"); location.reload(); });
window.addEventListener("load", () => {
  const saved = localStorage.getItem("dashpw");
  if (saved) { $("pw").value = saved; unlock(saved, true); }
});

// ---- 回报面板：口令加密 → 提交到公共仓库 inbox/ ----
const INBOX_REPO = "aidenyan0001/ay-etf-dash";
const b64e = (bytes) => { let s = ""; bytes.forEach((b) => s += String.fromCharCode(b)); return btoa(s); };

async function encryptReport(text, pw, fileBytes, fileMeta) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: 300000, hash: "SHA-256" }, km,
    { name: "AES-GCM", length: 256 }, false, ["encrypt"]);
  // v2 容器：4字节头长 + 头JSON(utf8) + 附件原始字节（可为空）
  const header = new TextEncoder().encode(JSON.stringify({
    text, ts: new Date().toISOString(),
    filename: fileMeta ? fileMeta.name : null, mime: fileMeta ? fileMeta.type : null,
  }));
  const body = fileBytes || new Uint8Array(0);
  const container = new Uint8Array(4 + header.length + body.length);
  new DataView(container.buffer).setUint32(0, header.length);
  container.set(header, 4);
  container.set(body, 4 + header.length);
  const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, container));
  return JSON.stringify({ v: 2, kind: "user-report", kdf: "PBKDF2-SHA256", iter: 300000, salt: b64e(salt), iv: b64e(iv), ct: b64e(ct) });
}

let attachedFile = null;
$("pattach").addEventListener("click", () => $("pfile").click());
$("pfile").addEventListener("change", () => {
  const f = $("pfile").files[0];
  if (!f) return;
  if (f.size > 15 * 1024 * 1024) {
    $("pmsg").className = "err"; $("pmsg").textContent = "附件超过 15MB，请压缩或截取局部"; $("pfile").value = ""; return;
  }
  attachedFile = f;
  $("pfinfo").style.display = "block";
  $("pfinfo").textContent = "📎 " + f.name + "（" + (f.size / 1024).toFixed(0) + " KB）— 再点附件可更换";
});

async function submitReport() {
  const text = $("report").value.trim();
  const pmsg = $("pmsg");
  pmsg.className = ""; pmsg.textContent = "";
  if (!text && !attachedFile) { pmsg.className = "err"; pmsg.textContent = "写点内容或加个附件"; return; }
  const pw = localStorage.getItem("dashpw");
  if (!pw) { pmsg.className = "err"; pmsg.textContent = "请先解锁仪表盘"; return; }
  let tok = localStorage.getItem("dashtok") || $("tok").value.trim();
  if (!tok) { $("tokwrap").style.display = "block"; pmsg.className = "err"; pmsg.textContent = "首次提交请填入回报令牌"; return; }
  $("psend").disabled = true; pmsg.textContent = "加密提交中…";
  try {
    const fileBytes = attachedFile ? new Uint8Array(await attachedFile.arrayBuffer()) : null;
    const enc = await encryptReport(text, pw, fileBytes, attachedFile);
    const name = "inbox/r-" + new Date().toISOString().replace(/[:.]/g, "-") + ".enc";
    const r = await fetch(`https://api.github.com/repos/${INBOX_REPO}/contents/${name}`, {
      method: "PUT",
      headers: { "Authorization": "Bearer " + tok, "Accept": "application/vnd.github+json" },
      body: JSON.stringify({ message: "user report", content: btoa(enc) }),
    });
    if (r.status === 201) {
      localStorage.setItem("dashtok", tok);
      $("tokwrap").style.display = "none"; $("report").value = "";
      attachedFile = null; $("pfile").value = ""; $("pfinfo").style.display = "none";
      pmsg.className = "ok"; pmsg.textContent = "✓ 已提交。系统将在 1 小时内摄取，下次例行运行处理并给出回执。";
    } else if (r.status === 401 || r.status === 403) {
      localStorage.removeItem("dashtok"); $("tokwrap").style.display = "block";
      pmsg.className = "err"; pmsg.textContent = "令牌无效或过期，请重新填入";
    } else {
      pmsg.className = "err"; pmsg.textContent = "提交失败 HTTP " + r.status + "，稍后重试";
    }
  } catch (e) {
    pmsg.className = "err"; pmsg.textContent = "网络错误，稍后重试";
  }
  $("psend").disabled = false;
}

$("reportbtn").addEventListener("click", () => {
  $("panel").style.display = "flex";
  if (!localStorage.getItem("dashtok")) $("tokwrap").style.display = "block";
});
$("pcancel").addEventListener("click", () => { $("panel").style.display = "none"; });
$("panel").addEventListener("click", (e) => { if (e.target === $("panel")) $("panel").style.display = "none"; });
$("psend").addEventListener("click", submitReport);
</script>
</body>
</html>
